name: Build and Publish Release Package

on:
  release:
    types: [created]

jobs:
  build-and-publish-release-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install server dependencies
        run: npm install --omit=prod --ignore-scripts
        working-directory: ./server

      - name: Build server
        run: npm run build
        working-directory: ./server

      - name: Install client dependencies
        run: npm install --omit=dev
        working-directory: ./client

      - name: Build client
        run: INDEX_FORMAT=ejs DISABLE_ESLINT_PLUGIN=true npm run build
        working-directory: ./client

      - name: Include licenses into dist
        run: |
          mv LICENSE.md server/dist
          mv "LICENSES/PLANKA Community License DE.md" server/dist/LICENSE_DE.md

      - name: Include built client into dist
        run: |
          mv ../../client/dist/* public
          mv public/index.ejs views
        working-directory: ./server/dist

      - name: Create release package
        run: |
          mv dist planka
          zip -r planka-prebuild.zip planka
        working-directory: ./server

      - name: Publish release package
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.event.release.tag_name }} planka-prebuild.zip
        working-directory: ./server

      - name: Show changelog and append to release notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${TAG#v}"
          if [ -f CHANGELOG.md ]; then
            SECTION=$(awk -v ver="$VERSION" '
              $0 ~ ("^## \\[" ver "\\]") {f=1; print; next}
              /^## / && f {exit}
              f {print}
            ' CHANGELOG.md)
            if [ -z "$SECTION" ]; then
              SECTION=$(awk '/^## /{c++} c==1' CHANGELOG.md)
            fi
          else
            SECTION="_CHANGELOG.md not found_"
          fi

          # Job Summary 출력
          {
            echo "## 📋 Changelog (${TAG})"
            echo ""
            echo "$SECTION"
          } >> "$GITHUB_STEP_SUMMARY"

          # 릴리스 노트에 추가 (이미 추가돼 있으면 건너뜀 — 사용자 작성 노트 보존)
          CURRENT=$(gh release view "$TAG" --json body -q .body 2>/dev/null || echo "")
          case "$CURRENT" in
            *"📋 Changelog"*)
              echo "Release notes already contain changelog; skipping."
              ;;
            *)
              printf '%s\n\n## 📋 Changelog\n\n%s\n' "$CURRENT" "$SECTION" \
                | gh release edit "$TAG" --notes-file -
              ;;
          esac
